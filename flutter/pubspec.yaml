name: screen_control
description: ScreenConnect mobile remote access application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  dio: ^5.3.1
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0
  image: ^4.0.17
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
  intl: ^0.19.0
  connectivity_plus: ^5.0.2
  permission_handler: ^11.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.1

flutter:
  uses-material-design: true
